name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: docker build -t kapilpattnaik/photo-gallery-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: docker build -t kapilpattnaik/photo-gallery-frontend:latest ./frontend

      - name: Push Backend Docker Image
        run: docker push kapilpattnaik/photo-gallery-backend:latest

      - name: Push Frontend Docker Image
        run: docker push kapilpattnaik/photo-gallery-frontend:latest