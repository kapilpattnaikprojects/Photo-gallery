name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Images to ECR
  

    runs-on: ubuntu-latest

    steps:

       

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::279715467865:role/github-ecr-oidc-role
          aws-region: ap-south-2
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t photo-gallery-backend ./backend
          docker tag photo-gallery-backend:latest \
          ${{ steps.login-ecr.outputs.registry }}/photo-gallery-backend:latest
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/photo-gallery-backend:latest


      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t photo-gallery-frontend ./frontend
          docker tag photo-gallery-frontend:latest \
          ${{ steps.login-ecr.outputs.registry }}/photo-gallery-frontend:latest
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/photo-gallery-frontend:latest


